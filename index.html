<!DOCTYPE html>
<html lang ="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense_tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="summary_datils">
            <div class="summary_balance">
                <div>
                    <h1>₹.</h1>
                    <h1 id="balance_amount"></h1>
                </div>
                <p>Balance</p>
            </div>
            <div class="summary_income">
                <div>
                    <h1>₹.</h1>
                    <h1 id="income_amount"></h1> 
                </div>
                <p>Income</p>
            </div>
            <div class="summary_expense">
                <div>
                    <h1>₹.</h1>
                    <h1 id="expense_amount"></h1>
                </div>
                <p>Expense</p>
            </div>
        </div>
        <div class="input_data_container">
            <form class="form_list">
                <label for="id_value" hidden>ID:</label>
                <input type="number" hidden id="id_value">
                <label for="date_value">Date:</label>
                <input type="date" id="date_value">
                <label for="detail">Detail:</label>
                <input type="text" placeholder="Detail" id="detail" autocomplete="off">
                <label for="amount">Amount:</label>
                <input type="number" placeholder="Rs." id="amount" autocomplete="off">
                <label for="category">Category:</label>
                <select name="category" id="category">
                    <option value="">Select_type</option>
                    <option value="Income">Income</option>
                    <option value="Expense">Expense</option>
                </select>
                <button id="add_btn" type="submit">Add</button>
            </form>
            <div class="table_detail">
                <table>
                    <thead>
                        <th hidden>S.no</th>
                        <th>Date</th>
                        <th>Detail</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Edit</th>
                        <th>Delete</th>
                    </thead>
                    <tbody id="table_data">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
